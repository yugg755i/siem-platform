<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SIEM{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        SIEM <span class="brand-sub">Platform</span>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-label">Monitor</div>

        <a href="/" class="nav-item {{ 'active' if request.path == '/' }}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
          Dashboard
        </a>
        <a href="/events" class="nav-item {{ 'active' if request.path.startswith('/events') }}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          Events
        </a>
        <a href="/alerts" class="nav-item {{ 'active' if request.path.startswith('/alerts') }}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          Alerts
        </a>

        <div class="nav-section-label">Investigate</div>

        <a href="/cases" class="nav-item {{ 'active' if request.path.startswith('/cases') }}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z"/></svg>
          Cases
        </a>
        <a href="/search" class="nav-item {{ 'active' if request.path.startswith('/search') }}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          Search
        </a>
      </nav>
    </aside>

    <div class="main">
      <header class="topbar">
        <div class="topbar-right">{% block topbar_right %}{% endblock %}</div>
      </header>

      <div class="content">
        <div class="content-head">
          <h1 class="page-title">{% block page_title %}{% endblock %}</h1>
          {% block page_actions %}{% endblock %}
        </div>

        {% block content %}{% endblock %}
      </div>
    </div>
  </div>
</body>
</html>
